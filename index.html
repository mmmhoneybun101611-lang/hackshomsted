<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacks Homestead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #3a3a3a 0%, #5a5a5a 40%, #4a4a4a 100%);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .site {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 50px 24px 40px;
    }

    header { text-align: center; margin-bottom: 44px; }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 3rem;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      color: #fff;
      text-align: left;
      line-height: 1.1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .tagline {
      color: #b5e7c4;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .call-wrap {
      position: relative;
      display: inline-block;
    }

    .call-btn {
      position: relative;
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff;
      border: none;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(45,106,79,0.5);
    }

    .call-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(45,106,79,0.6);
    }

    .call-btn:active { transform: scale(0.97); }

    .pulse-ring {
      position: absolute;
      top: 50%; left: 24px;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: pulse 1.8s ease-out infinite;
    }

    @keyframes pulse {
      0% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(3.5); opacity: 0; }
    }

    .toast {
      display: none;
      position: absolute;
      top: -58px;
      left: 50%;
      transform: translateX(-50%);
      background: #1b1b1b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      white-space: nowrap;
      z-index: 10;
    }

    .toast.show {
      display: block;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 36px 32px;
      margin-bottom: 32px;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    .sub {
      color: rgba(255,255,255,0.55);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 14px;
    }

    textarea::placeholder { color: rgba(255,255,255,0.35); }
    textarea:focus { border-color: rgba(255,255,255,0.5); }

    .send-btn {
      width: 100%;
      background: linear-gradient(135deg, #1565c0, #1976d2);
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(21,101,192,0.4);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(21,101,192,0.5);
    }

    .send-btn:active { transform: scale(0.98); }

    .success-msg {
      display: none;
      margin-top: 14px;
      background: rgba(45,106,79,0.3);
      border: 1px solid rgba(96,211,142,0.4);
      color: #b5e7c4;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      text-align: center;
    }

    footer {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .call-btn { font-size: 1rem; padding: 14px 24px; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="site">
    <header>
      <div class="logo-wrap">
        <div class="logo-icon">🌿</div>
        <div>
          <h1>Hacks Homestead</h1>
          <p class="tagline">Farm Fresh • Family Owned</p>
        </div>
      </div>

      <div class="call-wrap">
        <button class="call-btn" id="callBtn">
          <span class="pulse-ring"></span>
          📞 Call Us — (616) 463-8257
        </button>
        <div class="toast" id="toast">📋 Number copied — dial from your phone!</div>
      </div>
    </header>

    <section class="card">
      <h2>Send Us a Message</h2>
      <p class="sub">We'll get back to you as soon as possible.</p>
      <textarea id="messageBox" placeholder="Type your message here..."></textarea>
      <button class="send-btn" id="sendBtn">Send Message ✉️</button>
      <div class="success-msg" id="successMsg">✅ Message sent! We'll be in touch soon.</div>
    </section>

    <footer>© 2025 Hacks Homestead · (616) 463-8257</footer>
  </div>

  <script>
    // Particle background
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 55; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 2 + 0.5,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        o: Math.random() * 0.4 + 0.1
      });
    }

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(181,231,196,${p.o})`;
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // Call button
    const callBtn = document.getElementById('callBtn');
    const toast = document.getElementById('toast');
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    callBtn.addEventListener('click', () => {
      if (isMobile) {
        window.location.href = 'tel:6164638257';
      } else {
        navigator.clipboard.writeText('(616) 463-8257').then(() => {
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2800);
        }).catch(() => {
          prompt('Copy this number:', '(616) 463-8257');
        });
      }
    });

    // Send button (hooked up to Formspree later)
    document.getElementById('sendBtn').addEventListener('click', () => {
      const msg = document.getElementById('messageBox').value.trim();
      if (!msg) { alert('Please type a message first!'); return; }
      const successMsg = document.getElementById('successMsg');
      successMsg.style.display = 'block';
      document.getElementById('messageBox').value = '';
      setTimeout(() => successMsg.style.display = 'none', 4000);
    });
  </script>

</body>
</html>
